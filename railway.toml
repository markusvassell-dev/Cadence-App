# Railway configuration for the Cadence backend.
#
# This folder is the DEPLOY ROOT: the `app/` package sits directly beside this
# file, so uvicorn imports `app.main:app` with no `--app-dir` or `cd` juggling.
# Point your Railway service's Root Directory at this folder (or push its
# contents as the repository root and leave Root Directory blank).
#
# railpack auto-detects requirements.txt at the root and installs it, so no
# buildCommand is needed.
[build]
builder = "railpack"

[deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
